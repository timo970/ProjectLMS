<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css"
          integrity="sha384-giJF6kkoqNQ00vy+HMDP7azOuL0xtbfIcaT9wjKHr8RbDVddVHyTfAAsrekwKmP1"
          crossorigin="anonymous">
    <link rel="stylesheet" href="../static/style.css">
    <title>Регистрация</title>
</head>
<body>
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 450px;">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4">Регистрация</h3>

            <!-- Flash сообщения -->
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{% if category == 'error' %}danger{% elif category == 'success' %}success{% else %}{{ category }}{% endif %} alert-dismissible fade show" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('reg') }}" method="POST">
                <!-- Имя пользователя -->
                <div class="mb-3">
                    <label class="form-label">Придумайте никнейм</label>
                    <input name="username" type="text" class="form-control" required>
                </div>

                <!-- Email -->
                <div class="mb-3">
                    <label class="form-label">Ваш Email</label>
                    <input name="mail" type="email" class="form-control" placeholder="name@example.com" required>
                </div>

                <!-- Пароль -->
                <div class="mb-3">
                    <label class="form-label">Пароль</label>
                    <input type="password" class="form-control" placeholder="Придумайте пароль"
                           name="pass1" required>
                </div>

                <!-- Подтверждение пароля -->
                <div class="mb-3">
                    <label class="form-label">Повторите пароль</label>
                    <input type="password" class="form-control" placeholder="Повторите пароль"
                           name="pass2" required>
                </div>

                <!-- Согласие с правилами -->
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label" for="terms">Я согласен с условиями игры</label>
                </div>

                <!-- Кнопка -->
                <div class="d-grid">
                    <button type="submit" class="btn btn-success">Создать аккаунт</button>
                </div>
            </form>

            <div class="mt-3 text-center">
                <small>Уже есть аккаунт? <a href="{{ url_for('about') }}">Войти</a></small>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
